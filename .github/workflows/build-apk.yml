name: Build Expo APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install
        
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          
      - name: Install EAS CLI
        run: npm install -g eas-cli
        
      - name: Build APK
        run: |
          npx expo install expo-dev-client
          npx expo prebuild --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Pexpo.modules.autolinking=false
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Virginia-Home-Garden-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30