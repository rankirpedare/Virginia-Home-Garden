name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Generate Android files
        run: |
          # Create a temporary React Native project to get the Android files
          npx react-native init tempapp --version 0.72.0
          cp -r tempapp/android ./
          cp -r tempapp/ios ./  # Optional: for iOS builds
          rm -rf tempapp
          
          # Update the app name in Android files
          cd android
          find . -type f -name "*.xml" -o -name "*.gradle" -exec sed -i 's/tempapp/VirginiaHomeGarden/g' {} \;
          cd ..
          
      - name: Replace default App.js with your app
        run: |
          # Your App.js is already in the repo, we just need to make sure it's used
          echo "Using your existing App.js"
          
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Virginia-Home-Garden-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30